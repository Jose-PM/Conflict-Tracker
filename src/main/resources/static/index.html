<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conflict Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
<h1>Conflict Tracker - Conflicts</h1>
<table id="conflictsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Start Date</th>
        <th>Status</th>
        <th>Description</th>
        <th>Countries Involved</th>
    </tr>
    </thead>
    <tbody>
    <!-- Data will be inserted here -->
    </tbody>
</table>

<script>
    async function fetchConflicts() {
        try {
            const response = await fetch('/api/v1/conflicts');
            const conflicts = await response.json();
            const tbody = document.querySelector('#conflictsTable tbody');
            tbody.innerHTML = '';

            conflicts.forEach(conflict => {
                const countries = conflict.countries.map(c => c.name).join(', ');
                const row = `
                    <tr>
                        <td>${conflict.id}</td>
                        <td>${conflict.name}</td>
                        <td>${conflict.startDate}</td>
                        <td>${conflict.status}</td>
                        <td>${conflict.description}</td>
                        <td>${countries}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error('Error fetching conflicts:', error);
        }
    }

    // Load conflicts when page loads
    window.onload = fetchConflicts;
</script>
</body>
</html>
